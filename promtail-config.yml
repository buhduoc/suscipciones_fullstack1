server:
  http_listen_port: 9080

clients:
  - url: http://suscipciones-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: spring-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: spring-logs
          app: suscripciones-aws
          __path__: /var/log/app/*.log